name: Registry Publish

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build registry
        run: bun run registry:build

      - name: Validate registry (placeholder)
        run: |
          echo "Add registry validation here (path checks, dependency checks)"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build registry
        run: bun run registry:build

      - name: Upload registry artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-artifact
          path: r/

      - name: (Optional) Publish artifacts
        run: echo "Add publishing steps (GitHub Pages, CDN, or release upload)"
